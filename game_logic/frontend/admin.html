<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Bohara Lucky Draw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .wheel-container { position: relative; width: 300px; height: 300px; margin: auto; }
    .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #4f46e5;
      background: conic-gradient(#22c55e 0deg 60deg,#facc15 60deg 120deg,#3b82f6 120deg 180deg,
      #ef4444 180deg 240deg,#ec4899 240deg 300deg,#9333ea 300deg 360deg);
      transition: transform 4s ease-out; }
    .arrow { position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
      border-bottom: 30px solid #facc15; }
    .winner-card { background:#222; padding:10px; border-radius:8px; margin-top:10px; }
    .confetti { position: fixed; width: 10px; height: 10px; top: -10px; animation: fall 3s linear forwards; opacity: 0.8; }
    @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

  <!-- Top Bar -->
  <div class="flex justify-between items-center bg-indigo-700 p-4">
    <h1 class="text-2xl sm:text-3xl font-extrabold text-yellow-400">🛠 Admin Dashboard</h1>
    <nav class="space-x-4">
      <a href="index.html" class="px-3 py-2 bg-green-600 hover:bg-green-500 rounded-lg text-white font-bold">🏠 User Portal</a>
      <button onclick="logout()" class="px-3 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-white font-bold">🚪 Logout</button>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-grow p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Left: Wheel, Actions & Results -->
    <div class="space-y-6 text-center">
      <div class="wheel-container">
        <div class="arrow"></div>
        <div id="wheel" class="wheel"></div>
      </div>

      <div class="space-y-4 mt-6">
        <button id="drawBtn" class="w-full px-4 py-3 bg-green-600 hover:bg-green-500 rounded-lg text-white font-bold text-lg">
          🎲 Spin & Draw Winners
        </button>
        <button id="resetBtn" class="w-full px-4 py-3 bg-yellow-600 hover:bg-yellow-500 rounded-lg text-white font-bold text-lg">
          🔄 Reset Game
        </button>
      </div>

      <div id="drawArea" class="mt-6 space-y-4">
        <div id="results" class="text-xl font-bold text-indigo-300 space-y-2"></div>
      </div>

      <div class="mt-8">
        <h2 class="text-xl font-bold text-indigo-300 mb-2">🔒 Change Password</h2>
        <input type="password" id="newAdminPass" placeholder="New Password"
               class="mb-2 w-full p-2 rounded bg-gray-700 text-white">
        <button id="changePassBtn" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white font-bold">
          Update Password
        </button>
      </div>

      <div id="result" class="mt-6 text-lg text-green-400 whitespace-pre-line"></div>
    </div>

    <!-- Right: Participants -->
    <div>
      <h2 class="text-2xl font-bold text-indigo-300 mb-4">👥 Participants</h2>
      <table class="w-full border-collapse border border-gray-700">
        <thead>
          <tr class="bg-gray-800">
            <th class="border border-gray-700 px-4 py-2">Name</th>
            <th class="border border-gray-700 px-4 py-2">Phone</th>
            <th class="border border-gray-700 px-4 py-2">Numbers</th>
            <th class="border border-gray-700 px-4 py-2">Actions</th>
          </tr>
        </thead>
        <tbody id="participantsTable"></tbody>
      </table>
    </div>
  </div>

  <div class="footer text-center py-4 bg-indigo-700 text-white">Powered by Bohara Lucky Draw • Admin Control Panel</div>

  <audio id="dingSound" src="/static/ding.mp3" preload="auto"></audio>

  <script>
    const BACKEND_URL = "https://boharaluckydraw-backend.onrender.com";

    function launchConfetti() {
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.backgroundColor = ["#facc15","#22c55e","#3b82f6","#ef4444","#ec4899"][Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 5000);
      }
    }

    function playDing() {
      const sound = document.getElementById("dingSound");
      sound.currentTime = 0;
      sound.play();
    }

    async function logout() {
      const response = await fetch(`${BACKEND_URL}/logout`, { method: "GET", credentials:"include" });
      const data = await response.json();
      if (response.ok) {
        alert(data.message);
        window.location.href = "login.html";
      } else {
        alert("Logout failed: " + (data.error || "Unknown error"));
      }
    }

    document.getElementById("drawBtn").onclick = async () => {
      const wheel = document.getElementById("wheel");
      const spinDegrees = 720 + Math.floor(Math.random() * 360);
      wheel.style.transform = `rotate(${spinDegrees}deg)`;

      const response = await fetch(`${BACKEND_URL}/drawWinner`, { method: "POST", credentials:"include" });
      const data = await response.json();

      if (data.messages) {
        setTimeout(() => {
          document.getElementById("results").innerHTML = data.messages.map(m => `<div class="winner-card">🎉 ${m}</div>`).join("");
          playDing();
          launchConfetti();
        }, 4000);
      } else {
        document.getElementById("result").innerText = data.error || "Error during draw";
      }
    };

    document.getElementById("resetBtn").onclick = async () => {
      const response = await fetch(`${BACKEND_URL}/reset`, { method: "POST", credentials:"include" });
      const data = await response.json();
      document.getElementById("results").innerHTML = "";
      document.getElementById("result").innerText = data.message || data.error;
    };

    document.getElementById("changePassBtn").onclick = async () => {
      const newPass = document.getElementById("newAdminPass").value;
      if (!newPass) {
        document.getElementById("result").innerText = "⚠️ Please enter a new password.";
        return;
      }
      const response = await fetch(`${BACKEND_URL}/changePassword`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials:"include",
        body: JSON.stringify({ target:"admin", newPassword:newPass })
      });
      const data = await response.json();
      document.getElementById("result").innerText = data.message || data.error;
    };

    async function removeParticipant(phone) {
      const response = await fetch(`${BACKEND_URL}/removeParticipant`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials:"include",
        body: JSON.stringify({ phone })
      });
      const data = await response.json();
      alert(data.message || data.error);
      loadParticipants();
    }

        async function loadParticipants() {
      const response = await fetch(`${BACKEND_URL}/participants`, { credentials: "include" });
      const data = await response.json();
      const table = document.getElementById("participantsTable");
      table.innerHTML = "";
      data.requests.forEach(r => {
        const row = `<tr>
          <td class="border border-gray-700 px-4 py-2">${r.name}</td>
          <td class="border border-gray-700 px-4 py-2">${r.phone}</td>
          <td class="border border-gray-700 px-4 py-2">${r.numbers.join(", ")}</td>
          <td class="border border-gray-700 px-4 py-2 text-center">
            <button onclick="removeParticipant('${r.phone}')"
              class="px-3 py-1 bg-red-600 hover:bg-red-500 rounded text-white font-bold">
              Remove
            </button>
          </td>
        </tr>`;
        table.innerHTML += row;
      });
    }

    // Initial load
    loadParticipants();
  </script>
</body>
</html>
