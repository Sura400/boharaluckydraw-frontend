<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lucky Draw Admin</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; }
    canvas { border: 2px solid #444; margin: 20px auto; display: block; }
    .winner-card { background: #22c55e; color: #fff; padding: 10px; margin: 10px; border-radius: 5px; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #22c55e; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .confetti { position: fixed; width: 10px; height: 10px; top: 0; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(100vh); opacity: 0; } }
    table { margin: 20px auto; border-collapse: collapse; width: 80%; }
    td { border: 1px solid #444; padding: 5px; }
  </style>
</head>
<body>
  <h1>Lucky Draw Admin Panel</h1>

  <!-- Wheel -->
  <canvas id="wheelCanvas" width="400" height="400"></canvas>

  <!-- Draw & Reset -->
  <button id="drawBtn">🎲 Draw First Winner</button>
  <button id="resetBtn">🔄 Reset Game</button>

  <!-- Results -->
  <div id="firstResult"></div>
  <div id="secondResult"></div>
  <div id="thirdResult"></div>
  <p id="result"></p>

  <!-- Admin Actions -->
  <h2>Admin Controls</h2>
  <input id="newAdminPass" type="password" placeholder="New Admin Password">
  <button id="changePassBtn">Change Password</button>
  <br><br>
  <input id="removeNumber" type="number" placeholder="Number to remove">
  <input id="removeReason" type="text" placeholder="Reason">
  <button id="removeBtn">Remove Number</button>

  <!-- Participants -->
  <h2>Participants</h2>
  <table id="participantsTable"></table>

  <!-- Sound -->
  <audio id="dingSound" src="ding.mp3"></audio>

  <!-- Script -->
  <script src="admin.js"></script>
</body>
</html>
