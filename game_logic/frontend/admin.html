<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Bohara Lucky Draw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="static/style.css">
  <style>
    /* Spinner */
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #4f46e5;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Confetti */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: fall 3s linear forwards;
      opacity: 0.8;
    }
    @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

  <!-- Top Bar -->
  <div class="flex justify-between items-center bg-indigo-700 p-4">
    <h1 class="text-2xl sm:text-3xl font-extrabold text-yellow-400">🛠 Admin Dashboard</h1>
    <nav class="space-x-4">
      <a href="index.html" class="px-3 py-2 bg-green-600 hover:bg-green-500 rounded-lg text-white font-bold">🏠 User Portal</a>
      <a href="/logout" class="px-3 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-white font-bold">🚪 Logout</a>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-grow p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Left: Actions & Results -->
    <div class="space-y-6">
      <!-- Actions -->
      <div class="space-y-4">
        <button id="drawBtn" class="w-full px-4 py-3 bg-green-600 hover:bg-green-500 rounded-lg text-white font-bold text-lg">
          🎲 Draw Winner
        </button>
        <button id="resetBtn" class="w-full px-4 py-3 bg-yellow-600 hover:bg-yellow-500 rounded-lg text-white font-bold text-lg">
          🔄 Reset Game
        </button>
      </div>

      <!-- Results -->
      <div id="drawArea" class="mt-6 space-y-4">
        <div id="firstResult" class="text-xl font-bold text-indigo-300"></div>
        <div id="secondResult" class="text-xl font-bold text-indigo-300"></div>
        <div id="thirdResult" class="text-xl font-bold text-indigo-300"></div>
      </div>

      <!-- Change Password -->
      <div class="mt-8">
        <h2 class="text-xl font-bold text-indigo-300 mb-2">🔒 Change Password</h2>
        <input type="password" id="newAdminPass" placeholder="New Password"
               class="mb-2 w-full p-2 rounded bg-gray-700 text-white">
        <button id="changePassBtn" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white font-bold">
          Update Password
        </button>
      </div>

      <!-- Remove Number -->
      <div class="mt-8">
        <h2 class="text-xl font-bold text-indigo-300 mb-2">❌ Remove Participant Number</h2>
        <input type="number" id="removeNumber" placeholder="Number to Remove"
               class="mb-2 w-full p-2 rounded bg-gray-700 text-white">
        <input type="text" id="removeReason" placeholder="Reason (e.g. no payment)"
               class="mb-2 w-full p-2 rounded bg-gray-700 text-white">
        <button id="removeBtn" class="w-full px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-white font-bold">
          Remove Number
        </button>
      </div>

      <!-- Status -->
      <div id="result" class="mt-6 text-lg text-green-400 whitespace-pre-line"></div>
    </div>

    <!-- Right: Participants -->
    <div>
      <h2 class="text-2xl font-bold text-indigo-300 mb-4">👥 Participants</h2>
      <table class="w-full border-collapse border border-gray-700">
        <thead>
          <tr class="bg-gray-800">
            <th class="border border-gray-700 px-4 py-2">Name</th>
            <th class="border border-gray-700 px-4 py-2">Phone</th>
            <th class="border border-gray-700 px-4 py-2">Number</th>
          </tr>
        </thead>
        <tbody id="participantsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer text-center py-4 bg-indigo-700 text-white">Powered by Bohara Lucky Draw • Admin Control Panel</div>

  <!-- Sound -->
  <audio id="dingSound" src="/static/ding.mp3" preload="auto"></audio>

  <!-- Script -->
  <script>
    let drawStep = 0;

    function launchConfetti() {
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.backgroundColor = ["#facc15", "#22c55e", "#3b82f6", "#ef4444", "#ec4899"][Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 5000);
      }
    }

    function playDing() {
      const sound = document.getElementById("dingSound");
      sound.currentTime = 0;
      sound.play();
    }

    document.getElementById("drawBtn").onclick = async () => {
      drawStep++;
      if (drawStep > 3) {
        alert("All three winners have already been drawn!");
        return;
      }

      const targetId = drawStep === 1 ? "firstResult" : drawStep === 2 ? "secondResult" : "thirdResult";
      document.getElementById(targetId).innerHTML = '<div class="spinner"></div>';

      const response = await fetch("/draw", { method: "POST" });
      const data = await response.json();

      if (data.messages) {
        setTimeout(() => {
          let icon = drawStep === 1 ? "🚗" : drawStep === 2 ? "💵" : "🎰";
          document.getElementById(targetId).innerHTML = `
            <div class="winner-card">${icon} ${data.messages[drawStep-1]}</div>`;
          playDing();
          if (drawStep === 3) launchConfetti();
        }, 2000);
      } else {
        document.getElementById("result").innerText = data.error || "Error during draw";
      }
    };

    document.getElementById("resetBtn").onclick = async () => {
      const response = await fetch("/reset", { method: "POST" });
      const data = await response.json();
      document.getElementById("firstResult").innerText = "";
      document.getElementById("secondResult").innerText = "";
      document.getElementById("thirdResult").innerText = "";
      drawStep = 0;
      document.getElementById("result").innerText = data.message || data.error;
    };

    document.getElementById("changePassBtn").onclick = async () => {
      const newPass = document.getElementById("newAdminPass").value;
      const response = await fetch("/admin/change_password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: newPass })
      });
      const data = await response.json();
      document.getElementById("result").innerText = data.message || data.error;
    };

    document.getElementById("removeBtn").onclick = async () => {
      const num = parseInt(document.getElementById("removeNumber").value);
      const reason =     document.getElementById("removeBtn").onclick = async () => {
      const num = parseInt(document.getElementById("removeNumber").value);
      const reason = document.getElementById("removeReason").value;
      const response = await fetch("/admin/remove_number", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ number: num, reason })
      });
      const data = await response.json();
      document.getElementById("result").innerText = data.message || data.error;
      loadParticipants();
    };

    async function loadParticipants() {
      const response = await fetch("/participants");
      const data = await response.json();
      const table = document.getElementById("participantsTable");
      table.innerHTML = "";
      data.requests.forEach(r => {
        const row = `<tr>
          <td class="border border-gray-700 px-4 py-2">${r.name}</td>
          <td class="border border-gray-700 px-4 py-2">${r.phone}</td>
          <td class="border border-gray-700 px-4 py-2">${r.number}</td>
        </tr>`;
        table.innerHTML += row;
      });
    }

    // Initial load
    loadParticipants();
  </script>
</body>
</html>
