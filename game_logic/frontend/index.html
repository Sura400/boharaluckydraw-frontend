<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Portal - Bohara Lucky Draw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: url('static/background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      margin: 0;
    }
    body::before {
      content: "";
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.7);
      z-index: -1;
    }
    .top-bar {
      display:flex; justify-content:space-between; align-items:center;
      background: linear-gradient(90deg, #4f46e5, #9333ea);
      padding:10px;
      box-shadow: 0 0 20px #4f46e5;
    }
    .top-bar h1 { margin:0; font-size:1.4rem; font-family:'Orbitron', sans-serif; color:#facc15; }
    .card {
      background: rgba(34,34,34,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
    }
    #number-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
      gap: 8px;
      padding: 10px;
      justify-items: center;
    }
    .number-btn {
      width: 40px; height: 40px; border-radius: 50%;
      font-weight: bold; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    @media (min-width: 768px) {
      .number-btn { width: 60px; height: 60px; font-size: 16px; }
    }
    .number-btn.available {
      background: radial-gradient(circle at 30% 30%, #22c55e, #16a34a);
      color: white; box-shadow: 0 0 12px #22c55e;
    }
    .number-btn.taken {
      background: radial-gradient(circle at 30% 30%, #ef4444, #b91c1c);
      color: white; box-shadow: 0 0 12px #ef4444;
    }
    .number-btn.selected {
      background: radial-gradient(circle at 30% 30%, #facc15, #eab308);
      color: black; transform: scale(1.2);
      box-shadow: 0 0 20px #facc15; animation: pulse 0.5s ease;
    }
    @keyframes pulse { 0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1.2);} }
    input[type="text"] {
      font-size: 16px; padding: 12px; width: 100%; margin-bottom: 12px;
      border-radius: 8px; border: none; background: #333; color: #fff;
    }
    .winner-card {
      background: rgba(51,51,51,0.7); backdrop-filter: blur(8px);
      padding:10px; border-radius:6px; font-family:'Orbitron', sans-serif;
    }
    .footer {
      text-align:center; padding:10px;
      background: linear-gradient(90deg, #4f46e5, #9333ea);
      color:white; margin-top:20px; box-shadow: 0 0 20px #9333ea;
    }
    .confetti { position:fixed; width:10px; height:10px; top:0; animation:fall linear forwards; }
    @keyframes fall { to { transform:translateY(100vh); opacity:0; } }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <a href="/logout" class="px-3 py-1 bg-red-600 rounded-lg text-white font-bold">🚪 Logout</a>
    <h1>🎉 Bohara Lucky Draw</h1>
    <a href="login.html" class="px-3 py-1 bg-blue-600 rounded-lg text-white font-bold">🔑 Login</a>
  </div>

  <!-- Main Layout -->
  <div class="mt-6 w-full max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 px-4">
    <!-- Participants Table -->
    <div class="card overflow-y-auto max-h-[400px] md:max-h-[600px]">
      <h2 class="text-xl md:text-2xl font-bold text-indigo-300 mb-4">👥 Participants</h2>
      <table class="w-full border-collapse border border-gray-700">
        <thead>
          <tr class="bg-gray-800">
            <th class="border border-gray-700 px-4 py-2">Name</th>
            <th class="border border-gray-700 px-4 py-2">Phone</th>
            <th class="border border-gray-700 px-4 py-2">Numbers</th>
          </tr>
        </thead>
        <tbody id="participantsTable"></tbody>
      </table>
    </div>

    <!-- Number Selection -->
    <div class="flex flex-col items-center">
      <div class="card mb-6 w-full max-w-md text-center">
        <h2 class="text-2xl font-extrabold text-yellow-400 mb-4">✨ Submit Your Lucky Numbers ✨</h2>
        <input type="text" id="userName" placeholder="Your Name" class="mb-3 w-full p-3 rounded-lg bg-gray-800 text-white border border-indigo-500 focus:ring-2 focus:ring-yellow-400">
        <input type="text" id="userPhone" placeholder="Your Phone Number" class="mb-3 w-full p-3 rounded-lg bg-gray-800 text-white border border-indigo-500 focus:ring-2 focus:ring-yellow-400">

        <div id="number-grid"></div>

        <button id="submitBtn" class="mt-4 w-full px-6 py-3 bg-gradient-to-r from-green-500 to-green-700 hover:from-green-400 hover:to-green-600 rounded-xl text-white font-bold text-lg shadow-lg transform transition hover:scale-105">
          ✅ Submit Selection
        </button>

        <div id="result" class="mt-4 text-lg md:text-xl font-bold text-center text-green-400"></div>
      </div>
    </div>

    <!-- Winners List -->
    <div class="card overflow-y-auto max-h-[400px] md:max-h-[600px]">
      <h2 class="text-xl md:text-2xl font-bold text-yellow-300 mb-4">🏆 Round Winners</h2>
      <div id="winnersRounds" class="space-y-4"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">Powered by Bohara Lucky Draw • Mobile-Friendly Dashboard</div>

  <audio id="dingSound" src="/static/ding.mp3" preload="auto"></audio>

  <script>
    const BACKEND_URL = "https://boharaluckydraw-backend.onrender.com";
    const grid = document.getElementById("number-grid");
    let takenNumbers = [];

    async function loadParticipantsUI() {
      const response = await fetch(`${BACKEND_URL}/participants`);
      const data = await response.json();

      takenNumbers = data.requests.flatMap(r => r.numbers.map(num => parseInt(num)));

      const table = document.getElementById("participantsTable");
      table.innerHTML = "";
      data.requests.forEach(r => {
        const row = `<tr>
          <td class="border border-gray-700 px-4 py-2">${r.name}</td>
          <td class="border border-gray-700 px-4 py-2">${r.phone}</td>
          <td class="border border-gray-700 px-4 py-2">${r.numbers.join(", ")}</td>
        </tr>`;
        table.innerHTML += row;
      });

      renderGrid();
      loadWinnersUI();
    }

        function renderGrid() {
      grid.innerHTML = "";
      for (let i = 1; i <= 150; i++) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.innerText = i;
        btn.className = "number-btn";
        if (takenNumbers.includes(i)) {
          btn.classList.add("taken");
          btn.disabled = true;
        } else {
          btn.classList.add("available");
          btn.onclick = () => btn.classList.toggle("selected");
        }
        grid.appendChild(btn);
      }
    }

    async function loadWinnersUI() {
      const response = await fetch(`${BACKEND_URL}/winners`);
      const data = await response.json();
      const container = document.getElementById("winnersRounds");
      container.innerHTML = "";
      data.rounds.forEach(round => {
        const div = document.createElement("div");
        div.className = "winner-card";

        const title = document.createElement("h3");
        title.className = "text-lg font-bold text-yellow-400 mb-2";
        title.innerText = `Round ${round.round}`;
        div.appendChild(title);

        round.messages.forEach(msg => {
          const p = document.createElement("p");
          p.innerText = msg;
          div.appendChild(p);
        });

        container.appendChild(div);
      });
    }

    document.getElementById("submitBtn").onclick = async () => {
      const name = document.getElementById("userName").value.trim();
      const phone = document.getElementById("userPhone").value.trim();
      if (!name || !phone) {
        document.getElementById("result").innerText = "⚠️ Please enter your name and phone number.";
        return;
      }

      const selected = Array.from(grid.querySelectorAll(".selected")).map(b => parseInt(b.innerText));
      if (selected.length === 0) {
        document.getElementById("result").innerText = "⚠️ Please select at least one number.";
        return;
      }

      const payload = { name, phone, numbers: selected };

      try {
        const response = await fetch(`${BACKEND_URL}/choose`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        document.getElementById("result").innerText = data.message || data.error;
        loadParticipantsUI();
        playDing();
        launchConfetti();
      } catch (err) {
        console.error("Submission failed:", err);
        document.getElementById("result").innerText = "❌ Error submitting selection.";
      }
    };

    function launchConfetti() {
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.backgroundColor = ["#facc15", "#22c55e", "#3b82f6", "#ef4444", "#ec4899"][Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 5000);
      }
    }

    function playDing() {
      const sound = document.getElementById("dingSound");
      sound.currentTime = 0;
      sound.play();
    }

    // Initial load
    loadParticipantsUI();
  </script>
</body>
</html>
