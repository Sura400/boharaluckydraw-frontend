<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Bohara Nexus | Secure Authentication</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0a0c1a, #010105);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* animated particle background */
    .nebula-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: 
        radial-gradient(circle at 20% 30%, rgba(250, 204, 21, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(79, 70, 229, 0.1) 0%, transparent 50%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
    }

    /* floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.3;
      z-index: -1;
      animation: float 20s infinite ease-in-out;
    }
    .orb-1 { width: 300px; height: 300px; background: #facc15; top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #4f46e5; bottom: -150px; right: -100px; animation-delay: -5s; }
    .orb-3 { width: 200px; height: 200px; background: #22c55e; top: 50%; left: 70%; animation-delay: -10s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* premium navigation */
    .lux-nav {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(250, 204, 21, 0.3);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 2rem;
      color: #facc15;
      filter: drop-shadow(0 0 8px #facc15);
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFE6A3, #FACC15, #EAB308);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .portal-badge {
      background: rgba(250, 204, 21, 0.15);
      border-radius: 2rem;
      padding: 0.4rem 1.2rem;
      font-size: 0.8rem;
      border: 1px solid rgba(250, 204, 21, 0.3);
    }

    .user-link {
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      background: linear-gradient(95deg, #1e293b, #0f172a);
      border: 1px solid #22c55e;
      color: #22c55e;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .user-link:hover {
      background: #22c55e;
      color: #0f172a;
      transform: translateY(-2px);
      box-shadow: 0 0 15px #22c55e;
    }

    /* login card premium */
    .login-container {
      min-height: calc(100vh - 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .glass-login {
      background: rgba(12, 18, 34, 0.7);
      backdrop-filter: blur(18px);
      border-radius: 2rem;
      border: 1px solid rgba(250, 204, 21, 0.35);
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      width: 100%;
      max-width: 440px;
      padding: 2rem;
      transition: all 0.3s ease;
    }

    .glass-login:hover {
      border-color: rgba(250, 204, 21, 0.6);
      box-shadow: 0 35px 55px -18px black;
    }

    .login-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .lock-icon {
      font-size: 3rem;
      color: #facc15;
      margin-bottom: 0.5rem;
    }

    .login-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #facc15);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-icon {
      position: relative;
    }

    .input-icon i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #facc15;
      font-size: 1rem;
    }

    .premium-field {
      width: 100%;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(250, 204, 21, 0.4);
      border-radius: 1.5rem;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      color: white;
      font-size: 1rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .premium-field:focus {
      outline: none;
      border-color: #facc15;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.2);
      background: rgba(0, 0, 0, 0.7);
    }

    .premium-field::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .login-btn {
      background: linear-gradient(95deg, #facc15, #eab308);
      border: none;
      border-radius: 2rem;
      padding: 1rem;
      font-weight: 800;
      font-size: 1rem;
      color: #0f172a;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.5rem;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px -8px rgba(250, 204, 21, 0.5);
      filter: brightness(1.02);
    }

    .result-message {
      margin-top: 1.2rem;
      padding: 0.8rem;
      border-radius: 1rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .result-error {
      background: rgba(220, 38, 38, 0.2);
      border-left: 3px solid #ef4444;
      color: #fecaca;
    }

    .result-success {
      background: rgba(34, 197, 94, 0.2);
      border-left: 3px solid #22c55e;
      color: #bbf7d0;
      animation: pulseSuccess 0.5s ease;
    }

    @keyframes pulseSuccess {
      0% { transform: scale(0.98); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .card-glow {
      animation: cardGlow 0.8s ease-in-out;
    }

    @keyframes cardGlow {
      0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); border-color: rgba(250,204,21,0.3); }
      50% { box-shadow: 0 0 0 6px rgba(250, 204, 21, 0.4), 0 0 20px 10px rgba(250,204,21,0.2); border-color: #facc15; }
      100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
    }

    .footer {
      text-align: center;
      padding: 1.2rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(250, 204, 21, 0.2);
      font-size: 0.8rem;
    }

    @media (max-width: 500px) {
      .glass-login { padding: 1.5rem; margin: 1rem; }
      .logo-text { font-size: 1.2rem; }
      .lux-nav { padding: 0.8rem 1rem; }
    }
  </style>
</head>
<body>

<div class="nebula-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<nav class="lux-nav">
  <div class="logo-area">
    <i class="fas fa-crown logo-icon"></i>
    <span class="logo-text">BOHARA<span style="color:#fff;"> | LUCKY DRAW</span></span>
  </div>
  <div class="portal-badge">
    <i class="fas fa-shield-alt"></i> Secure Gateway
  </div>
  <a href="index.html" class="user-link">
    <i class="fas fa-arrow-right-to-bracket"></i> User Portal
  </a>
</nav>

<div class="login-container">
  <div class="glass-login" id="loginCard">
    <div class="login-header">
      <div class="lock-icon">
        <i class="fas fa-fingerprint"></i>
      </div>
      <h2>Administrator Access</h2>
      <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 5px;">Authenticate to control the draw</p>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="username" class="premium-field" placeholder="Admin / Super Admin Username" autocomplete="off" autofocus>
        </div>
      </div>
      <div class="input-group">
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="premium-field" placeholder="Secure Password">
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginSubmitBtn">
        <i class="fas fa-key"></i> Authenticate
      </button>
    </form>

    <div id="resultMessage" class="result-message" style="display: none;"></div>
    
    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.7rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
      <i class="fas fa-shield-haltered"></i> Role-based secure routing • Session protected
    </div>
  </div>
</div>

<footer class="footer">
  <i class="fas fa-gem"></i> Bohara Lucky Draw — Elite Security Architecture | v2.0
</footer>

<script>
  // Backend endpoint - production ready
  const BACKEND_URL = "https://boharaluckydraw-backend.onrender.com";
  
  // DOM Elements
  const loginForm = document.getElementById("loginForm");
  const usernameInput = document.getElementById("username");
  const passwordInput = document.getElementById("password");
  const resultDiv = document.getElementById("resultMessage");
  const loginCard = document.getElementById("loginCard");
  const submitBtn = document.getElementById("loginSubmitBtn");

  // Helper: display styled message
  function showMessage(text, isError = true) {
    resultDiv.style.display = "block";
    resultDiv.textContent = text;
    resultDiv.className = `result-message ${isError ? 'result-error' : 'result-success'}`;
    if (!isError) {
      // add glow effect on card
      loginCard.classList.add('card-glow');
      setTimeout(() => {
        loginCard.classList.remove('card-glow');
      }, 800);
    }
  }

  function hideMessage() {
    resultDiv.style.display = "none";
  }

  // Helper: animate button loading state
  function setButtonLoading(loading) {
    if (loading) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';
    } else {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-key"></i> Authenticate';
    }
  }

  // Login submission logic with role detection
  async function handleLogin(e) {
    e.preventDefault();
    
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    
    if (!username || !password) {
      showMessage("⚠️ Please enter both username and password", true);
      return;
    }
    
    hideMessage();
    setButtonLoading(true);
    
    try {
      const response = await fetch(`${BACKEND_URL}/login`, {
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        credentials: "include", // essential for session cookie
        body: JSON.stringify({ username, password })
      });
      
      const data = await response.json();
      
      if (response.ok && data.success) {
        // Successful login
        const role = data.role; // 'admin' or 'superadmin'
        const welcomeMsg = data.message || `Welcome back, ${username}!`;
        showMessage(`✅ ${welcomeMsg} — Redirecting to ${role === 'superadmin' ? 'Super Admin' : 'Admin'} panel...`, false);
        
        // Add success animation to inputs
        usernameInput.style.borderColor = "#22c55e";
        passwordInput.style.borderColor = "#22c55e";
        
        // Short delay for user to see success message
        setTimeout(() => {
          if (role === "superadmin") {
            window.location.href = "superadmin.html";
          } else if (role === "admin") {
            window.location.href = "admin.html";
          } else {
            // fallback: if role unrecognized but login success, go to admin
            console.warn("Unknown role, redirecting to admin");
            window.location.href = "admin.html";
          }
        }, 1300);
      } else {
        // Login failed - backend returned error
        const errorMsg = data.error || data.message || "Invalid credentials. Please try again.";
        showMessage(`❌ ${errorMsg}`, true);
        // reset borders
        usernameInput.style.borderColor = "";
        passwordInput.style.borderColor = "";
        // shake effect subtle
        loginCard.style.transform = "translateX(4px)";
        setTimeout(() => { loginCard.style.transform = ""; }, 100);
        setButtonLoading(false);
      }
    } catch (err) {
      console.error("Login network error:", err);
      showMessage("🌐 Network error: Unable to reach authentication server. Please check connection.", true);
      setButtonLoading(false);
      usernameInput.style.borderColor = "";
      passwordInput.style.borderColor = "";
    }
  }

  // Event binding
  loginForm.addEventListener("submit", handleLogin);
  
  // Add visual feedback for input focus
  const inputs = [usernameInput, passwordInput];
  inputs.forEach(input => {
    input.addEventListener("focus", () => {
      hideMessage();
      input.style.borderColor = "#facc15";
    });
    input.addEventListener("blur", () => {
      input.style.borderColor = "";
    });
  });
  
  // Optional: prefill demo hint (for development only - but not prefilling sensitive)
  console.log("Secure Login Portal Ready | Bohara Lucky Draw");
  
  // Handle Enter key (already supported by form submit)
  // Additional: session check - if user already logged in, redirect appropriately to avoid double login
  async function checkExistingSession() {
    try {
      const resp = await fetch(`${BACKEND_URL}/participants`, { 
        credentials: "include",
        method: "GET",
        headers: { "Accept": "application/json" }
      });
      // if we get a successful response, user might be logged in as admin? we can test by trying to access protected route
      // but participants is accessible for any? Actually participants might be public, but we can check via a protected endpoint.
      // Better: try to fetch admin specific or just ignore, no need auto redirect to avoid confusion.
    } catch(e) {}
  }
  // checkExistingSession(); (optional, but not mandatory)
</script>
</body>
</html>
