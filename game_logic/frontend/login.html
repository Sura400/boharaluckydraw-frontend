<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Bohara Lucky Draw</title>
  <style>
    body { background:#111; color:#fff; font-family:Arial,sans-serif; margin:0; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; background:#4f46e5; padding:10px; }
    .top-bar h1 { margin:0; font-size:1.5rem; color:#facc15; }
    .card { background:#222; padding:20px; border-radius:8px; width:300px; margin:50px auto; }
    input { width:100%; padding:10px; margin-bottom:10px; border-radius:4px; border:none; background:#333; color:#fff; }
    button { width:100%; padding:10px; background:#4f46e5; color:#fff; font-weight:bold; border:none; border-radius:4px; cursor:pointer; }
    button:hover { background:#4338ca; }
    #loginResult { margin-top:10px; text-align:center; }
  </style>
</head>
<body>

  <!-- Branding bar -->
  <div class="top-bar">
    <h1>🎉 Bohara Lucky Draw</h1>
    <a href="index.html" class="px-4 py-2 bg-blue-600 rounded-lg text-white font-bold">🏠 Home</a>
  </div>

  <!-- Login card -->
  <div class="card">
    <h2>🔑 Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="loginResult"></div>
  </div>

  <script>
    document.getElementById("loginBtn").onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        document.getElementById("loginResult").innerText = "⚠️ Please enter both username and password.";
        return;
      }

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (data.error) {
          document.getElementById("loginResult").innerText = "❌ " + data.error;
        } else {
          document.getElementById("loginResult").innerText = "✅ Logged in as " + data.role;
          if (data.role === "admin") window.location.href = "admin.html";
          if (data.role === "superadmin") window.location.href = "superadmin.html";
        }
      } catch (err) {
        console.error("Login failed:", err);
        document.getElementById("loginResult").innerText = "❌ Server error during login.";
      }
    };
  </script>
</body>
</html>
