<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Bohara Lucky Draw</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
  <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-3xl font-extrabold text-yellow-400 mb-6 text-center">🔑 Login</h1>
    
    <form id="loginForm" class="space-y-4">
      <input type="text" id="username" placeholder="Username" class="w-full p-3 rounded bg-gray-700 text-white" required>
      <input type="password" id="password" placeholder="Password" class="w-full p-3 rounded bg-gray-700 text-white" required>
      <button type="submit" class="w-full px-4 py-3 bg-green-600 hover:bg-green-500 rounded-lg text-white font-bold">
        Login
      </button>
    </form>

    <div id="result" class="mt-4 text-red-400 text-center font-semibold"></div>
  </div>

  <script>
    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (response.ok) {
          if (data.role === "admin") {
            window.location.href = "admin.html";
          } else if (data.role === "superadmin") {
            window.location.href = "superadmin.html";
          } else {
            document.getElementById("result").innerText = "❌ Unknown role.";
          }
        } else {
          document.getElementById("result").innerText = data.error || "❌ Invalid credentials.";
        }
      } catch (err) {
        document.getElementById("result").innerText = "❌ Server error. Please try again.";
      }
    };
  </script>
</body>
</html>
