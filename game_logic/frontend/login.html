<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Bohara Lucky Draw</title>
  <style>
    body { background:#111; color:#fff; font-family:Arial,sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { background:#222; padding:20px; border-radius:8px; width:300px; }
    input { width:100%; padding:10px; margin-bottom:10px; border-radius:4px; border:none; }
    button { width:100%; padding:10px; background:#4f46e5; color:#fff; font-weight:bold; border:none; border-radius:4px; cursor:pointer; }
    button:hover { background:#4338ca; }
    #loginResult { margin-top:10px; text-align:center; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔑 Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="loginResult"></div>
  </div>

  <script>
    document.getElementById("loginBtn").onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      const payload = { username, password };

      const response = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      if (data.error) {
        document.getElementById("loginResult").innerText = "❌ " + data.error;
      } else {
        document.getElementById("loginResult").innerText = "✅ Logged in as " + data.role;
        if (data.role === "admin") window.location.href = "admin.html";
        if (data.role === "superadmin") window.location.href = "superadmin.html";
      }
    };
  </script>
</body>
</html>
