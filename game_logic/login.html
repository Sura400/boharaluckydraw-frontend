<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - B&S Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="static/style.css">
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
  <div class="bg-gray-800 p-6 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-indigo-400 mb-4">Login</h1>
    
    <!-- Login Form -->
    <form id="loginForm">
      <input type="text" name="username" id="username" placeholder="Username" 
             class="mb-4 w-full p-2 rounded bg-gray-700 text-white" required>
      <input type="password" name="password" id="password" placeholder="Password" 
             class="mb-4 w-full p-2 rounded bg-gray-700 text-white" required>
      <button type="submit" id="loginBtn"
              class="w-full px-4 py-2 bg-green-600 hover:bg-green-400 rounded-lg text-white font-bold transition">
        🔑 Login
      </button>
    </form>

    <div class="mt-4 text-center">
      <a href="#" onclick="alert('Password recovery handled by backend');" 
         class="text-indigo-400 hover:text-indigo-200">Forgot Password?</a>
    </div>

    <div id="result" class="mt-4 text-red-400 text-center"></div>
  </div>

  <script>
    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        document.getElementById("result").innerText = "⚠️ Please enter both username and password.";
        return;
      }

      try {
        const response = await fetch("https://boharaluckydraw-backend.onrender.com/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (data.role === "admin") {
          window.location.href = "admin.html";
        } else if (data.role === "superadmin") {
          window.location.href = "superadmin.html";
        } else {
          document.getElementById("result").innerText = data.error || "Invalid credentials";
        }
      } catch (err) {
        document.getElementById("result").innerText = "❌ Server error. Please try again.";
      }
    };
  </script>
</body>
</html>
