<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Superadmin Dashboard - Lucky Draw</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-gray-900 via-purple-900 to-black text-white min-h-screen">
  <div class="p-6">
    <!-- Top Bar -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-extrabold text-purple-400">👑 Superadmin Dashboard</h1>
      <a href="index.html" class="px-4 py-2 bg-red-600 hover:bg-red-400 rounded-lg text-white font-bold">🚪 Logout</a>
    </div>

    <!-- Secret Winner Override -->
    <div class="card p-6 bg-gray-800 rounded-lg shadow-lg mb-10">
      <h2 class="text-2xl font-bold text-purple-300 mb-4">🔒 Secretly Set Winner</h2>
      <label class="block mb-2 text-gray-300">Select Slot</label>
      <select id="slotSelect" class="mb-4 w-full p-2 rounded bg-gray-700 text-white">
        <option value="first">First Winner</option>
        <option value="second">Second Winner</option>
        <option value="third">Third Winner</option>
      </select>

      <label class="block mb-2 text-gray-300">Enter Number</label>
      <input type="number" id="winnerNumber" placeholder="Number (1-150)" 
             class="mb-4 w-full p-2 rounded bg-gray-700 text-white">

      <button id="setBtn" class="w-full px-4 py-2 bg-purple-600 hover:bg-purple-400 rounded-lg text-white font-bold">
        ✅ Secretly Set Winner
      </button>

      <div id="result" class="mt-4 text-lg text-green-400"></div>
    </div>

    <!-- Change Password -->
    <div class="card p-6 bg-gray-800 rounded-lg shadow-lg">
      <h2 class="text-2xl font-bold text-purple-300 mb-4">🔑 Change Superadmin Password</h2>
      <input type="password" id="newSuperPass" placeholder="New Password"
             class="mb-4 w-full p-2 rounded bg-gray-700 text-white">
      <button id="changePassBtn" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-400 rounded-lg text-white font-bold">
        Update Password
      </button>
      <div id="passResult" class="mt-4 text-lg text-green-400"></div>
    </div>
  </div>

  <script>
    // ✅ Secret winner override
    document.getElementById("setBtn").onclick = async () => {
      const slot = document.getElementById("slotSelect").value;
      const number = parseInt(document.getElementById("winnerNumber").value);

      if (!number || number < 1 || number > 150) {
        document.getElementById("result").innerText = "⚠️ Please enter a valid number between 1 and 150.";
        return;
      }

      const response = await fetch("https://boharaluckydraw-backend.onrender.com/superadmin/set_winners", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slot, number })
      });
      const data = await response.json();
      document.getElementById("result").innerText = data.message || data.error;
    };

    // ✅ Change superadmin password
    document.getElementById("changePassBtn").onclick = async () => {
      const newPass = document.getElementById("newSuperPass").value;
      if (!newPass) {
        document.getElementById("passResult").innerText = "⚠️ Please enter a new password.";
        return;
      }

      const response = await fetch("https://boharaluckydraw-backend.onrender.com/superadmin/change_password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: newPass })
      });
      const data = await response.json();
      document.getElementById("passResult").innerText = data.message || data.error;
    };
  </script>
</body>
</html>
